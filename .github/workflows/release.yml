name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.9.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip PyPI publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v4

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" api/pyproject.toml

      - name: Update lock file
        run: cd api && uv lock --no-sources

      - name: Create version commit and tag (local only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/pyproject.toml api/uv.lock
          if git diff --cached --quiet; then
            echo "Version already set to ${{ inputs.version }}, skipping commit"
          else
            git commit -m "chore(release): v${{ inputs.version }}"
          fi
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"

      - name: Install dependencies
        run: |
          cd frontend && npm ci
          cd ../api && uv sync --no-sources

      - name: Build frontend + wheel
        run: make build-pypi

      - name: Verify build
        run: make build-verify

      - name: Push version commit and tag
        run: git push origin main --tags

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        continue-on-error: true
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG-release.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback changelog
        if: steps.changelog.outcome == 'failure'
        run: echo "Release v${{ inputs.version }}" > CHANGELOG-release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: CHANGELOG-release.md
          files: |
            api/dist/*.whl
            api/dist/*.tar.gz

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: api/dist/

  publish:
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
