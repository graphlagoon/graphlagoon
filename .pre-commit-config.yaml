repos:
  # Gitleaks — secret detection (all files)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

  # Ruff — Python lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        files: ^api/
      - id: ruff-format
        files: ^api/

  # Frontend — vitest on related staged files
  - repo: local
    hooks:
      - id: vitest-related
        name: vitest related tests
        entry: bash -c 'cd frontend && STAGED=$(git diff --cached --name-only --diff-filter=ACM | grep "^frontend/src/.*\.ts$" | sed "s|^frontend/||") && [ -z "$STAGED" ] && exit 0 || npx vitest related $STAGED --run'
        language: system
        files: ^frontend/src/.*\.ts$
        pass_filenames: false

