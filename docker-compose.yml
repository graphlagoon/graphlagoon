version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=sgraph
      - POSTGRES_PASSWORD=sgraph
      - POSTGRES_DB=sgraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
